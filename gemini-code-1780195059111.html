<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimesh Bro - Official Website</title>
    <style>
        /* CSS styling for the website */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            text-align: center;
        }

        /* Banner Section */
        .banner-container {
            width: 100%;
            height: 250px;
            background: linear-gradient(90deg, #ff5100 0%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* Profile Section */
        .profile-section {
            margin-top: -60px;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #ff5100;
            background-color: #000;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .channel-name {
            font-size: 2rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .channel-handle {
            color: #aaaaaa;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        /* Social Media Links */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px auto;
            max-width: 800px;
        }

        .social-btn {
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.2s, opacity 0.2s;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .youtube-btn { background-color: #ff0000; }
        .telegram-btn { background-color: #0088cc; }
        .whatsapp-btn { background-color: #25d366; }
        .tiktok-btn { background-color: #010101; border: 1px solid #ff0050; }
        .instagram-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        /* Video Section */
        .video-section {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #ff5100;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .video-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 81, 0, 0.3);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }

        .thumbnail-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 15px;
            text-align: left;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            height: 2.8em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
    </style>
</head>
<body>

    <!-- Banner -->
    <div class="banner-container">
        <img src="logos\channels4_banner.jpg" alt="Nimesh Bro Banner" class="banner-img" onerror="this.style.display='none'">
    </div>

    <!-- Profile -->
    <div class="profile-section">
   
        <img src="logos\photo_2023-01-09_05-09-41.jpg" alt="Nimesh Bro Logo" class="logo-img" onclick="openYouTubeChannel()">
        <div class="channel-name">Nimesh bro</div>
        <div class="channel-handle">@nimeshbrooo</div>
    </div>

    <!-- Social Media Links -->
    <div class="social-container">
        <a href="https://www.youtube.com/@nimeshbrooo" target="_blank" class="social-btn youtube-btn">❑ YouTube Channel</a>
        <a href="https://t.me/nimeshbroyoutube" target="_blank" class="social-btn telegram-btn">❑ Telegram Channel</a>
        <a href="https://t.me/joinchat/yMhS3g--AEJmNjI1" target="_blank" class="social-btn telegram-btn">❑ Telegram Group</a>
        <a href="https://chat.whatsapp.com/KvSfyVKOinR" target="_blank" class="social-btn whatsapp-btn">❑ Whatsapp Group</a>
        <a href="https://vt.tiktok.com/ZSdvXqqeJ/" target="_blank" class="social-btn tiktok-btn">❑ Tiktok</a>
        <a href="https://instagram.com/nimeshbrooo" target="_blank" class="social-btn instagram-btn">❑ Instagram</a>
    </div>

    <hr style="border: 0; height: 1px; background: #333; margin: 20px auto; max-width: 80% ;">

    <!-- Videos Display Section -->
    <div class="video-section">
        <div class="section-title">Mage Aluthma Video Click Karala Balanna</div>
        
        <div class="video-grid">
            
            <!-- Video Card 1 -->
            <!-- data-video-url eka athulatha adala youtube video link eka danna -->
            <div class="video-card" data-video-url="https://www.youtube.com/watch?v=VIDEO_ID_1" onclick="watchVideo(this)">
                <div class="thumbnail-container">
                    <!-- video eke photo (thumbnail) eka 'v1.jpg' kiyala danna -->
                    <img src="v1.jpg" alt="Video Thumbnail" class="thumbnail-img">
                </div>
                <div class="video-info">
                    <div class="video-title">PHOTOS VIDEOS Phone eken PC ekata Control karamu</div>
                </div>
            </div>

            <!-- Video Card 2 -->
            <div class="video-card" data-video-url="https://www.youtube.com/watch?v=VIDEO_ID_2" onclick="watchVideo(this)">
                <div class="thumbnail-container">
                    <img src="v2.jpg" alt="Video Thumbnail" class="thumbnail-img">
                </div>
                <div class="video-info">
                    <div class="video-title">Oya dena ona Text ekakata wadena Voice ekak hadamu</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Logo eka click karahama main channel ekata yanna
        function openYouTubeChannel() {
            window.open("https://www.youtube.com/@nimeshbrooo", "_blank");
        }

        // Photo eka/Card eka click karama youtube video eka open wenna
        function watchVideo(element) {
            var url = element.getAttribute("data-video-url");
            if(url) {
                window.open(url, "_blank");
            }
        }
    </script>
</body>
</html>
